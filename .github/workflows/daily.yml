name: monitor-cvm-fatos-relevantes daily

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID_ALERTAS: ${{ secrets.CLICKUP_LIST_ID_ALERTAS }}
          CLICKUP_ASSIGNEE_IDS: ${{ secrets.CLICKUP_ASSIGNEE_IDS }}
        run: python monitor.py --lookback 10

      - name: Commit state if changed
        run: |
          git config user.name "marvin-cvm-bot"
          git config user.email "marvin-cvm-bot@users.noreply.github.com"
          git add historico/ data/
          if git diff --staged --quiet; then
            echo "Nada para commitar"
          else
            git commit -m "Atualiza historico e state $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
